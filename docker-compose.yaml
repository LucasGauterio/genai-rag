version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: genai-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    entrypoint: [
      "sh", "-c",
      "ollama serve & sleep 5 && ollama pull nomic-embed-text && wait"
    ]

volumes:
  ollama_data:
